{% extends 'base.html' %}
{% block title %}Восстановление пароля{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm auth-panel">
            <div class="card-body p-4">
                <span class="eyebrow">Восстановление доступа</span>
                <h2 class="mb-4 mt-3">Сброс пароля</h2>

                {% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
                {% if success %}<div class="alert alert-success">{{ success }}</div>{% endif %}

                <form method="post" action="/forgot-password">
                    <div class="mb-3">
                        <label class="form-label">Логин</label>
                        <input type="text" name="username" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Новый пароль</label>
                        <div class="input-group"><input type="password" id="new-password" name="new_password" class="form-control" required minlength="6"><button type="button" class="btn btn-outline-secondary" data-password-toggle data-password-target="new-password">Показать</button></div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Повтори новый пароль</label>
                        <div class="input-group"><input type="password" id="confirm-password" name="confirm_password" class="form-control" required minlength="6"><button type="button" class="btn btn-outline-secondary" data-password-toggle data-password-target="confirm-password">Показать</button></div>
                    </div>
                    <button class="btn btn-primary w-100">Обновить пароль</button>
                </form>

                <div class="text-center mt-3">
                    <a href="/login">Вернуться ко входу</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
