<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Student Assistant{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<div class="page-shell">
    <div class="topbar-wrap">
        <nav class="navbar navbar-expand-lg navbar-dark topbar">
            <div class="container">
                <a class="navbar-brand" href="{% if request.session.get('user_id') %}/dashboard{% else %}/{% endif %}">
                    <span class="brand-mark">SA</span>
                    <span>Student Assistant</span>
                </a>
                <button class="navbar-toggler border-0 text-white" type="button" data-bs-toggle="collapse" data-bs-target="#navbarsExample07">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarsExample07">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                        {% if request.session.get('user_id') %}
                        <li class="nav-item"><a class="nav-link {% if request.url.path == '/dashboard' %}active{% endif %}" href="/dashboard">Главная</a></li>
                        <li class="nav-item"><a class="nav-link {% if request.url.path.startswith('/subjects') %}active{% endif %}" href="/subjects">Предметы</a></li>
                        <li class="nav-item"><a class="nav-link {% if request.url.path.startswith('/tasks') %}active{% endif %}" href="/tasks">Задания</a></li>
                        <li class="nav-item"><a class="nav-link {% if request.url.path.startswith('/schedule') %}active{% endif %}" href="/schedule">Расписание</a></li>
                        <li class="nav-item"><a class="nav-link {% if request.url.path.startswith('/notes') %}active{% endif %}" href="/notes">Заметки</a></li>
                        <li class="nav-item"><a class="nav-link {% if request.url.path.startswith('/telegram') %}active{% endif %}" href="/telegram">Telegram</a></li>
                        {% endif %}
                    </ul>
                    <div class="d-flex gap-2">
                        {% if request.session.get('user_id') %}
                            <a href="/logout" class="btn btn-outline-light btn-sm">Выйти</a>
                        {% else %}
                            <a href="/login" class="btn btn-outline-light btn-sm">Вход</a>
                            <a href="/register" class="btn btn-primary btn-sm">Регистрация</a>
                        {% endif %}
                    </div>
                </div>
            </div>
        </nav>
    </div>

    <main class="container content-wrap">
        {% block content %}{% endblock %}
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
